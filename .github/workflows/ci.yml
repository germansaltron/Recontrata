name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend (tests + aislamiento multi-tenant)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: faenascore
          POSTGRES_PASSWORD: faenascore_test
          POSTGRES_DB: faenascore_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U faenascore"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Activa el harness de integración (tests de aislamiento + PII).
      TEST_DATABASE_URL: postgresql+asyncpg://faenascore:faenascore_test@localhost:5432/faenascore_test
      AUTH_MOCK_ENABLED: "true"
      DEBUG: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests (unit + multi-tenant isolation gate)
        working-directory: backend
        run: pytest -q

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build
