<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recontrata — Evaluación de desempeño para contratistas | A quién recontratar</title>
    <meta name="description" content="Software de evaluación de desempeño para contratistas de minería y construcción. Registra quién rindió en cada proyecto y decide a quién recontratar con datos reales, desde el celular en terreno." />
    <meta name="keywords" content="evaluación de desempeño, contratistas, recontratación, minería, construcción, faena, trabajadores, supervisores" />
    <!-- QUITAR al lanzar: pre-lanzamiento, no indexar -->
    <meta name="robots" content="noindex, nofollow" />

    <!-- Favicons / app icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#2563eb" />
    <!-- iOS: sin estos metas Safari no trata la app como standalone al agregarla a
         la pantalla de inicio, y el modo sin señal (terreno) no persiste bien. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Recontrata" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Recontrata" />
    <meta property="og:title" content="Recontrata — Evalúa el desempeño. Recontrata con datos." />
    <meta property="og:description" content="La gente que vuelve es lo que hace grande a tu próximo proyecto. Registra quién rindió y decide a quién recontratar con datos, desde el celular en terreno." />
    <meta property="og:url" content="https://recontrata.cl" />
    <meta property="og:image" content="https://recontrata.cl/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Recontrata — Evalúa el desempeño. Recontrata con datos." />
    <meta name="twitter:description" content="La gente que vuelve es lo que hace grande a tu próximo proyecto. Registra quién rindió y decide a quién recontratar con datos, desde el celular en terreno." />
    <meta name="twitter:image" content="https://recontrata.cl/og-image.png" />
  </head>
  <body>
    <!-- Splash de marca: el logo se ARMA al instante (video nativo, antes del JS).
         React lo retira y hace el morph al navbar (ver BootIntro). -->
    <div id="boot-splash">
      <video id="boot-video" src="/logo-intro.mp4" autoplay muted playsinline preload="auto"></video>
    </div>
    <style>
      html, body { background:#FFFFFF; margin:0; }
      /* fondo BLANCO = el navegador pinta el fondo del video en blanco; igualarlo
         hace que el rectangulo del video sea invisible (en todos los navegadores). */
      #boot-splash { position:fixed; inset:0; z-index:60; display:flex;
        align-items:center; justify-content:center; background:#FFFFFF; }
      /* ~la mitad de antes: el logo se ve mas contenido y elegante */
      #boot-video { max-width:45vw; max-height:30vh; background:#FFFFFF; }
      @media (max-width:640px) { #boot-video { max-width:80vw; max-height:24vh; } }
    </style>
    <script>
      // No mostrar el intro si ya se vio esta sesion o si el usuario pidio menos movimiento.
      (function () {
        try {
          var seen = sessionStorage.getItem('recontrata_intro_seen');
          var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
          // QUITAR al lanzar: sin código de acceso no mostramos el intro (gate de pre-lanzamiento)
          var access = localStorage.getItem('recontrata_access');
          var unlocked = access && parseInt(access, 10) > Date.now();
          // El Portal del Trabajador (/p/:token) es público y NO renderiza BootIntro,
          // así que nadie retiraría el splash desde React. Para un tester/empresa que
          // SÍ tiene el código de acceso guardado, el splash quedaría encima para
          // siempre ("el logo y nada más"). Retirarlo siempre en rutas del portal.
          var isPortal = window.location.pathname.indexOf('/p/') === 0;
          if (seen || reduced || !unlocked || isPortal) {
            var s = document.getElementById('boot-splash');
            if (s) s.remove();
          }
        } catch (e) {}
      })();
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
