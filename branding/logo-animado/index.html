<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Recontrata — logo animado</title>
<style>
  :root { --blue:#2563eb; --ink:#1e293b; }
  body { margin:0; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
         gap:28px; background:#f8fafc; font-family:'Segoe UI',system-ui,sans-serif; }
  .stage { display:flex; align-items:center; }
  .controls { display:flex; gap:10px; }
  button { font:inherit; padding:8px 16px; border:1px solid #cbd5e1; border-radius:8px; background:#fff; cursor:pointer; }
  button:hover { background:#f1f5f9; }
  .dark { background:#0f172a; padding:40px 56px; border-radius:16px; }

  /* ---- Animación ---- */
  .logo { width:360px; height:auto; overflow:visible; }

  .sq { transform-box: fill-box; transform-origin:center; opacity:0; animation: sqIn .5s cubic-bezier(.2,.8,.2,1) forwards; }

  .arrow-grp { transform-box: fill-box; transform-origin:32px 32px; }
  .arc { stroke-dasharray:100; stroke-dashoffset:100; animation: draw 1s ease-in-out .35s forwards; }
  .head { opacity:0; transform-box: fill-box; transform-origin:center; animation: pop .35s cubic-bezier(.3,1.4,.5,1) 1.2s forwards; }
  /* giro sutil del símbolo completo al cerrar el ciclo */
  .spin { transform-box: fill-box; transform-origin:32px 32px; animation: spin 1.1s cubic-bezier(.6,0,.2,1) 1.5s forwards; }

  .wm { opacity:0; }
  .wm-re { opacity:0; animation: wordIn .5s ease-out 1.55s forwards; }
  .wm-rest { opacity:0; animation: wordIn .6s ease-out 1.75s forwards; }

  @keyframes sqIn   { from{opacity:0; transform:scale(.7)} to{opacity:1; transform:scale(1)} }
  @keyframes draw   { to { stroke-dashoffset:0 } }
  @keyframes pop    { 0%{opacity:0; transform:scale(.4)} 70%{opacity:1; transform:scale(1.15)} 100%{opacity:1; transform:scale(1)} }
  @keyframes spin   { from{transform:rotate(0)} to{transform:rotate(360deg)} }
  @keyframes wordIn { from{opacity:0; transform:translateX(-8px)} to{opacity:1; transform:translateX(0)} }

  .replaying * { animation: none !important; }
</style>
</head>
<body>
  <div class="stage" id="stageLight">
    <svg class="logo" viewBox="0 0 280 64" xmlns="http://www.w3.org/2000/svg" aria-label="Recontrata">
      <g class="spin">
        <rect class="sq" x="8" y="8" width="48" height="48" rx="12" fill="#2563eb"/>
        <g class="arrow-grp" transform="translate(16,16) scale(1.333)" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path class="arc" pathLength="100" d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path class="head" d="M3 3v5h5"/>
        </g>
      </g>
      <text class="wm" x="68" y="41" font-family="Segoe UI, system-ui, sans-serif" font-size="30" font-weight="700" letter-spacing="-0.5">
        <tspan class="wm-re" fill="#2563eb">Re</tspan><tspan class="wm-rest" fill="#1e293b">contrata</tspan>
      </text>
    </svg>
  </div>

  <div class="stage dark">
    <svg class="logo" viewBox="0 0 280 64" xmlns="http://www.w3.org/2000/svg" aria-label="Recontrata">
      <g class="spin">
        <rect class="sq" x="8" y="8" width="48" height="48" rx="12" fill="#3b82f6"/>
        <g class="arrow-grp" transform="translate(16,16) scale(1.333)" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path class="arc" pathLength="100" d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path class="head" d="M3 3v5h5"/>
        </g>
      </g>
      <text class="wm" x="68" y="41" font-family="Segoe UI, system-ui, sans-serif" font-size="30" font-weight="700" letter-spacing="-0.5">
        <tspan class="wm-re" fill="#60a5fa">Re</tspan><tspan class="wm-rest" fill="#e2e8f0">contrata</tspan>
      </text>
    </svg>
  </div>

  <div class="controls">
    <button onclick="replay()">▶ Reproducir de nuevo</button>
  </div>

<script>
  function replay(){
    document.querySelectorAll('.stage').forEach(s=>{
      const c = s.cloneNode(true);
      s.parentNode.replaceChild(c, s);
    });
  }
</script>
</body>
</html>
